<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS2 Match Analyses</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }

    .top {
      text-align: center;
      padding: 20px 20px 15px;
      animation: fadeInDown 0.8s ease-out;
      position: relative;
    }
    .back-btn {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: .5rem;
      color: #94a3b8;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: color .2s;
    }
    .back-btn:hover { color: #60a5fa; }
    .back-btn svg { width: 16px; height: 16px; }

    .top h1 {
      font-size: 2.5rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .top p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: 8px;
    }

    main {
      flex: 1;
      padding: 30px 20px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    #matchGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 20px;
      animation: fadeIn 0.8s ease-out;
    }

    /* ── CARD ── */
    .match-card {
      background: rgba(255,255,255,0.05);
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      display: block;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: relative;
      animation: fadeIn .4s ease both;
    }
    .match-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(96,165,250,0.1), rgba(52,211,153,0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 20px;
      pointer-events: none;
    }
    .match-card:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: rgba(96,165,250,0.5);
      box-shadow: 0 10px 30px rgba(96,165,250,0.3);
    }
    .match-card:hover::before { opacity: 1; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .65rem 1.1rem;
      background: rgba(0,0,0,0.25);
      border-bottom: 2px solid rgba(255,255,255,0.1);
      font-size: .75rem;
      color: #94a3b8;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .card-meta .tournament { color: white; font-weight: 700; }
    .card-meta .dot { width: 3px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 50%; }
    .format-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.1);
      color: #cbd5e1;
      padding: 2px 10px;
      border-radius: 6px;
      font-size: .7rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .card-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: .5rem;
      padding: 1.3rem 1.1rem;
      position: relative;
      z-index: 1;
    }
    .team { display: flex; flex-direction: column; gap: .25rem; }
    .team.right { align-items: flex-end; text-align: right; }
    .team-name { font-weight: 700; font-size: 1.35rem; line-height: 1; }
    .team-rank { font-size: .75rem; color: #94a3b8; }
    .win-bar-wrap { width: 100%; margin-top: .35rem; }
    .win-pct { font-size: .75rem; font-weight: 700; color: #60a5fa; margin-bottom: 3px; }
    .team.right .win-pct { color: #34d399; }
    .win-bar { height: 5px; border-radius: 3px; background: #60a5fa; }
    .team.right .win-bar { margin-left: auto; background: #34d399; }
    .vs-block { text-align: center; font-size: .85rem; font-weight: 800; color: #475569; letter-spacing: .1em; }

    .team-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }
    .team-logo-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 800;
      color: #64748b;
      margin-bottom: 6px;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1.1rem 1rem;
      position: relative;
      z-index: 1;
    }
    .pred-block { display: flex; align-items: center; gap: .6rem; }
    .pred-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .07em; color: #64748b; }
    .pred-team { font-weight: 700; color: #60a5fa; font-size: .95rem; }
    .pred-score {
      font-weight: 700; font-size: .85rem; color: #cbd5e1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; padding: 2px 10px;
    }
    .confidence-block { display: flex; align-items: center; gap: .4rem; }
    .conf-label { font-size: .7rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .conf-dots { display: flex; gap: 3px; }
    .conf-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }
    .conf-dot.on { background: #60a5fa; }

    .card-risks {
      margin: 0 1.1rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      position: relative;
      z-index: 1;
    }
    .risk-pill {
      font-size: .7rem;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      border-radius: 6px;
      padding: 2px 8px;
    }

    /* empty */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 5rem 2rem;
      color: #64748b;
    }
    .empty-state h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: .5rem; color: #94a3b8; }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      color: #94a3b8;
      font-size: .9rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
    }
    .by-tydan { font-size: .8rem; color: #64748b; }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 600px) {
      #matchGrid { grid-template-columns: 1fr; }
      .team-name { font-size: 1.05rem; }
      .back-btn span { display: none; }
    }
  </style>
</head>
<body>

<header class="top">
  <a href="../" class="back-btn">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M10 3L5 8l5 5"/>
    </svg>
    <span>CS2 Hub</span>
  </a>
  <h1>CS2 ANALYSES</h1>
  <p>HLTV map stats • Pick analysis • Win probability</p>
</header>

<main>
  <div id="matchGrid"></div>
</main>

<footer>
  <span>CS2 Match Analyses</span>
  <span class="by-tydan">by Tydan</span>
</footer>

<script src="matches.js"></script>
<script src="logos.js"></script>
<script>
  function teamLogo(shortName) {
    const url = (typeof teamLogos !== 'undefined') ? teamLogos[shortName] : null;
    if (url && url !== 'placeholder.png') {
      return `<img class="team-logo" src="${url}" alt="${shortName}" onerror="this.outerHTML='<div class=team-logo-placeholder>${shortName.substring(0,2).toUpperCase()}</div>'">`;
    }
    return `<div class="team-logo-placeholder">${shortName.substring(0,2).toUpperCase()}</div>`;
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function confDots(n) {
    let html = '';
    for (let i = 1; i <= 10; i++) {
      html += `<div class="conf-dot ${i <= n ? 'on' : ''}"></div>`;
    }
    return html;
  }

  function buildCard(m, index) {
    const riskPills = m.risks.map(r => `<span class="risk-pill">⚠ ${r}</span>`).join('');

    return `
      <a class="match-card" href="analysis.html?id=${m.id}" style="animation-delay:${index * 0.07}s">
        <div class="card-meta">
          <span class="tournament">${m.tournament}</span>
          <span class="dot"></span>
          <span>${formatDate(m.date)}</span>
          <span class="format-badge">${m.format}</span>
        </div>

        <div class="card-teams">
          <div class="team left">
            ${teamLogo(m.team1.shortName)}
            <div class="team-name">${m.team1.shortName}</div>
            <div class="team-rank">#${m.team1.rank} ${m.team1.name}</div>
            <div class="win-bar-wrap">
              <div class="win-pct">${m.team1.winChance}%</div>
              <div class="win-bar" style="width:${m.team1.winChance}%"></div>
            </div>
          </div>
          <div class="vs-block">VS</div>
          <div class="team right">
            ${teamLogo(m.team2.shortName)}
            <div class="team-name">${m.team2.shortName}</div>
            <div class="team-rank">#${m.team2.rank} ${m.team2.name}</div>
            <div class="win-bar-wrap">
              <div class="win-pct">${m.team2.winChance}%</div>
              <div class="win-bar" style="width:${m.team2.winChance}%"></div>
            </div>
          </div>
        </div>

        <div class="card-bottom">
          <div class="pred-block">
            <div>
              <div class="pred-label">Prediction</div>
              <div class="pred-team">🏆 ${m.prediction}</div>
            </div>
            <div class="pred-score">${m.predictionScore}</div>
          </div>
          <div class="confidence-block">
            <span class="conf-label">Confidence</span>
            <div class="conf-dots">${confDots(m.confidence)}</div>
            <span style="font-size:.8rem;color:#94a3b8">${m.confidence}/10</span>
          </div>
        </div>

        <div class="card-risks">${riskPills}</div>
      </a>`;
  }

  function render() {
    const grid = document.getElementById('matchGrid');
    if (!matches || matches.length === 0) {
      grid.innerHTML = `<div class="empty-state"><h2>Brak analiz</h2><p>Dodaj pierwszy mecz do pliku <code>matches.js</code></p></div>`;
      return;
    }
    const sorted = [...matches].sort((a, b) => new Date(b.date) - new Date(a.date));
    grid.innerHTML = sorted.map((m, i) => buildCard(m, i)).join('');
  }

  render();
</script>
</body>
</html>
